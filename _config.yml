# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Yimo Cai"
title_separator          : "-"
name                     : "Yimo Cai"
description              : "Yimo Cai's Personal Website - Undergraduate at Tsinghua University"
url                      : "https://JamesCai23.github.io"
baseurl                  : ""
repository               : "JamesCai23/JamesCai23.github.io"

# Site Author
author:
  avatar           : "profile.jpg"
  name             : "Yimo Cai"
  bio              : "3rd-year Undergraduate in Electronic Engineering at Tsinghua University. Researching 3D Vision and Multimodal Models."
  location         : "Beijing, China"
  email            : "caiym23@mails.tsinghua.edu.cn"
  github           : "JamesCai23"
  # links can be added here as per template structure if needed, 
  # but the template usually uses specific keys like 'github', 'email', etc.

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   : 
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Collections
collections:
  teaching:
    output: true
    permalink: /teaching/:path/
  publications:
    output: true
    permalink: /publications/:path/
  portfolio:
    output: true
    permalink: /portfolio/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
